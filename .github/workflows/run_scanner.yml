name: Hourly Stock Scan
on:
  schedule:
    - cron: '0 14-21 * * 1-5'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # עדכנו מ-v3 ל-v4
      - uses: actions/setup-python@v5 # עדכנו מ-v4 ל-v5
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - name: Run Hourly Scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
