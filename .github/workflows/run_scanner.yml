name: Hourly Stock Scan
on:
  schedule:
    # ירוץ בכל שעה עגולה מ-14:00 ועד 21:00 UTC (ימי שני עד שישי)
    # זה מכסה את שעות המסחר העיקריות בארה"ב
    - cron: '0 14-21 * * 1-5'
  workflow_dispatch: # מאפשר לך להריץ ידנית מתי שבא לך
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - name: Run Hourly Scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
