name: Daily Stock Scan

on:
  schedule:
    # ירוץ פעם ביום ב-16:05 שעון ישראל (14:05 UTC)
    - cron: '5 14 * * 1-5'
  push: # <--- הוספתי את זה: עכשיו כל "שמירה" תפעיל סריקה מיידית!
    branches:
      - main
  workflow_dispatch: # מאפשר ריצה ידנית

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - name: Run Daily Scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
